<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Важный вопрос</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Привет! ❤️</h1>
        <p>У меня к тебе вопрос...</p>
        <div class="question">Хочешь ли ты пойти со мной на свидание?</div>
        <div class="buttons">
            <button class="yes-btn" id="yesBtn">ДА, КОНЕЧНО!</button>
            <button class="no-btn" id="noBtn">Нет</button>
        </div>
        <div id="message" class="message"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
